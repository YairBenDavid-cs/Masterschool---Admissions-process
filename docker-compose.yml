version: '3.8'

services:
  admissions-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Masterschool-Admissions-Engine

    # Self-healing: restart automatically if the app crashes or the host reboots
    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      # Security: mount flow_config.json read-only so the container cannot
      # modify the host file even if compromised
      - ./flow_config.json:/app/flow_config.json:ro

    environment:
      - FLOW_CONFIG_PATH=/app/flow_config.json

    # Resource guardrails: prevent runaway memory from taking down the host
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
